name: Daily NSE Prediction Pipeline

on:
  workflow_dispatch:
  schedule:
    # Run at 1:17 UTC (06:47 IST) to cover regular market data
    - cron: '17 1 * * 1-5'
    # Run at 15:30 UTC (20:21 IST) to cover if any early data is available for the day
    - cron: '17 15 * * 1-5'    

jobs:
  build-and-evaluate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'


      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # ------------------------------------------------
      # Run Nifty Data Downloader
      # ------------------------------------------------

      - name: Run nifty data downloader
        shell: bash
        run: |
          python Code/nsedatadailydownload.py


      - name: Read download dates
        shell: bash
        run: |
          content=$(cat backward_date.txt)
          IFS=, read folder_date file_date <<< "$content"
          echo "FOLDER_DATE=$folder_date" >> $GITHUB_ENV
          echo "FILE_DATE=$file_date" >> $GITHUB_ENV


      - name: Commit backward files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Output/$FOLDER_DATE/

          git commit -m "Nifty data for $(date +'%Y-%m-%d')" || echo "No changes to commit"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}


      
      # ------------------------------------------------
      # Cleanup
      # ------------------------------------------------

      - name: Cleanup temp files
        shell: bash
        run: |
          rm -f backward_date.txt
